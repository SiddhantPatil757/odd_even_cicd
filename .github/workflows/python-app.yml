name : python application


on:
    push:
        branches : ["main"]
    pull_request:
        branches : ["main"]


jobs :
    build:
        runs-on: ubuntu-latest
        
        steps:
            - name: checkout
              uses : actions/checkout@v3
            
            - name : setup Python
              uses : actions/setup-python@v4
              with :
                python-version: "3.10"
            - name : Install dependencies
              run :  pip install -r requirments.txt
            
            - name : Run tests
              run: pytest